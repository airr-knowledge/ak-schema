---
id: https://github.com/airr-knowledge/ak-schema
name: ak-schema

classes:

  ImmuneSystem:
    abstract: true
    is_a: NamedThing
    class_uri: UBERON:0002405 # immune system

  Chain:
    is_a: AKObject
    slots:
      - species
      - aa_hash
      - junction_aa_vj_allele_hash
      - junction_aa_vj_gene_hash
      - complete_vdj
      - sequence
      - sequence_aa
      - locus
      - v_call
      - d_call
      - j_call
      - c_call
      - junction_aa
      - cdr1_aa
      - cdr2_aa
      - cdr3_aa
    slot_usage:
      sequence_aa:
        pattern: "^[ACDEFGHIKLMNPQRSTVWY]+$"
      junction_aa:
        pattern: "^C[ACDEFGHIKLMNPQRSTVWY]+$"

  ImmuneReceptor:
    abstract: true
    is_a: AKObject

  TCellReceptor:
    abstract: true
    is_a: ImmuneReceptor
    class_uri: GO:0042101
    slots:
      - type

  AlphaBetaTCR:
    is_a: TCellReceptor
    class_uri: GO:0042105
    slots:
      - tra_chain
      - trb_chain

  GammaDeltaTCR:
    is_a: TCellReceptor
    class_uri: GO:0042106
    slots:
      - trg_chain
      - trd_chain

  BCellReceptor:
    is_a: ImmuneReceptor
    slots:
      - igh_chain
      - igk_chain
      - igl_chain

  Antigen:
    is_a: NamedThing
    class_uri: OBI:1110034 # antigen
    slots:
      - source_molecule
      - source_organism

  Epitope:
    is_a: ForeignObject    # source_uri should point to IEDB CURIE
    class_uri: OBI:1110001 # epitope
    slots:
      - epitope_ref
      - antigen

  PeptidicEpitope:
    is_a: Epitope
    slots:
      - sequence_aa
      - modifications

    slot_usage:
      sequence_aa:
        pattern: '^[ACDEFGHIKLMNPQRSTVWY]+$'

  DiscontinuousEpitope:
    is_a: Epitope
    slots:
      - positional_residues
    slot_usage:
      positional_residues:
        pattern: '^([ACDEFGHIKLMNPQRSTVWY]\d{1,}, ){0,}[ACDEFGHIKLMNPQRSTVWY]\d{1,}$'

  NonPeptidicEpitope:
    is_a: Epitope
    slots:
      - epitope_name

  AntibodyAntigenComplex:
    is_a: NamedThing
    class_uri: OBI:0003119
    slots:
      - antibody
      - antigen
      - epitope

  TCRpMHCComplex:
    is_a: TCREpitopeComplex
    class_uri: OBI:0003120
    slots:
      - tcr
      - antigen
      - epitope
      - mhc
      - mhc_evidence

  MHCProteinComplex:
    is_a: ForeignObject   # source_uri should point to MRO CURIE
    class_uri: GO:0042611 # MHC protein complex
    slots:
      - mhc_name
      - mhc_class

slots:
  aa_hash:
    name: aa_hash
    range: string

  junction_aa_vj_allele_hash:
    name: junction_aa_vj_allele_hash
    range: string

  junction_aa_vj_gene_hash:
    name: junction_aa_vj_gene_hash
    range: string

  complete_vdj:
    name: complete_vdj
    description: Complete VDJ flag.
    range: boolean

  sequence:
    name: sequence
    description: Nucleotide sequence.
    range: string

  isotype:
    name: isotype
    description: The isotype of the chain
    range: string

  igh_chain:
    description: IG heavy chain
    range: Chain

  igl_chain:
    description: IG lambda light chain
    range: Chain

  igk_chain:
    description: IG kappa light chain
    range: Chain

  tra_chain:
    description: T cell receptor alpha chain
    range: Chain

  trb_chain:
    description: T cell receptor beta chain
    range: Chain

  trd_chain:
    description: T cell receptor delta chain
    range: Chain

  trg_chain:
    description: T cell receptor gamma chain
    range: Chain

  source_molecule:
    description: The protein or other molecule that this antigen represents

  source_organism:
    description: The organism that the source molecule comes from
    range: TaxonomicSpecies

  antibody:
    description: B cell receptor, immunoglobulin antibody
    range: BCellReceptor

  antigen:
    description: A material entity with antigen role
    range: Antigen

  epitope:
    description: Epitope of an antigen, which can be recognized by a T cell receptor or antibody
    range: Epitope

  positional_residues:
    description: Numbered amino acid residues of a conformational epitope
    range: string

  modifications:
    description: Post-translational modifications to the epitope peptide sequence
    range: string

  tcr:
    description: T cell receptor
    range: TCellReceptor

  mhc:
    description: Major histocompatibility complex
    range: MHCProteinComplex

  epitope_name:
    description: Name of the non-peptidic epitope
    range: string

  mhc_name:
    description: Human-readable name of the major histocompatibility complex
    range: string

  mhc_class:
    description: Class of the major histocompatibility complex
    range: MHCClasEnum

  mhc_evidence:
    description: Evidence code for MHC restriction
    range: uriorcurie


enums:

  MHCClasEnum:
    permissible_values:
      MHC-I:
      MHC-II:
      MHC-nonclassical: